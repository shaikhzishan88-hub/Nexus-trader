<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SMC ANALYZER</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:#060a0f;font-family:'IBM Plex Mono',monospace;color:#c8dcc8}
::-webkit-scrollbar{width:4px;background:#060a0f}
::-webkit-scrollbar-thumb{background:#1a3020;border-radius:2px}

/* HEADER */
#header{background:#080c14;border-bottom:1px solid #1a2820;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:'Bebas Neue';font-size:22px;color:#2aff7a;letter-spacing:3px}
.logo span{color:#e2f4ea}
.sub{font-size:8px;color:#3a5a4a;letter-spacing:2px;margin-top:2px}

/* MAIN */
#app{max-width:100%;padding:14px}

/* PAIR + TF selector */
.selector-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.sel-group{flex:1;min-width:120px}
.sel-label{font-size:8px;color:#3a6a4a;letter-spacing:2px;margin-bottom:5px}
.sel-wrap{display:flex;gap:4px;flex-wrap:wrap}
.sel-btn{background:#0a0f18;border:1px solid #1a2820;padding:4px 8px;border-radius:3px;cursor:pointer;color:#6a8a7a;font-family:'IBM Plex Mono';font-size:9px;transition:all .15s}
.sel-btn.active{border-color:#2aff7a;color:#2aff7a;background:#0a1a12}
.sel-input{background:#0a0f18;border:1px solid #1a2820;border-radius:4px;padding:6px 10px;color:#e2f4ea;font-family:'IBM Plex Mono';font-size:11px;outline:none;width:100%}
.sel-input:focus{border-color:#2aff7a}

/* UPLOAD AREA */
#upload-section{margin-bottom:14px}
.upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.upload-slot{background:#0a0f18;border:1px dashed #1a3020;border-radius:6px;padding:10px;text-align:center;cursor:pointer;transition:all .2s;position:relative;min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.upload-slot:hover{border-color:#2aff7a;background:#0a1a12}
.upload-slot.has-img{border-style:solid;border-color:#2aff7a}
.slot-tf{font-size:9px;color:#2aff7a;font-weight:600;margin-bottom:4px;letter-spacing:1px}
.slot-hint{font-size:8px;color:#3a5a4a}
.slot-img{width:100%;height:70px;object-fit:cover;border-radius:3px;margin-bottom:4px}
.slot-remove{position:absolute;top:4px;right:4px;background:#2e0d0d;border:none;color:#ff4a4a;width:18px;height:18px;border-radius:50%;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono'}
.upload-input{display:none}

/* ADD TF button */
.add-tf-btn{width:100%;padding:8px;background:rgba(42,255,122,.06);border:1px dashed rgba(42,255,122,.3);color:#2aff7a;font-family:'IBM Plex Mono';font-size:10px;border-radius:4px;cursor:pointer;margin-bottom:10px;letter-spacing:1px}

/* ANALYZE BTN */
.analyze-btn{width:100%;padding:14px;background:#2aff7a;color:#060a0f;font-family:'IBM Plex Mono';font-weight:600;font-size:13px;border:none;border-radius:6px;cursor:pointer;letter-spacing:2px;transition:all .2s;margin-bottom:14px}
.analyze-btn:disabled{opacity:.5;cursor:not-allowed}
.analyze-btn:active{background:#1aef6a}

/* STATUS */
#status{text-align:center;font-size:10px;color:#2aff7a;margin-bottom:10px;min-height:16px}

/* RESULT */
#result{display:none}
.result-card{background:#080c14;border:1px solid #1a2820;border-radius:8px;overflow:hidden;margin-bottom:12px}
.result-header{padding:12px 14px;border-bottom:1px solid #1a2820;display:flex;align-items:center;justify-content:space-between}
.result-title{font-size:10px;color:#3a6a4a;letter-spacing:2px}

/* DIRECTION */
.direction-box{padding:14px;border-bottom:1px solid #1a2820;display:flex;align-items:center;justify-content:space-between}
.dir-text{font-family:'Bebas Neue';font-size:36px;letter-spacing:3px}
.dir-buy{color:#2aff7a}
.dir-sell{color:#ff4a4a}
.dir-wait{color:#ffaa00}
.conf-box{text-align:right}
.conf-num{font-size:28px;font-weight:600;color:#e2f4ea}
.conf-lbl{font-size:8px;color:#3a6a4a;letter-spacing:1px}

/* LEVELS */
.levels-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:12px;border-bottom:1px solid #1a2820}
.level-cell{background:#0a0f18;border:1px solid #1a2820;border-radius:4px;padding:8px 10px}
.level-lbl{font-size:8px;color:#3a5a4a;letter-spacing:1px;margin-bottom:3px}
.level-val{font-size:13px;font-weight:600}

/* BIAS */
.bias-row{padding:10px 12px;border-bottom:1px solid #1a2820;display:flex;gap:6px;flex-wrap:wrap}
.bias-pill{font-size:8px;padding:3px 7px;border-radius:3px;font-weight:600}
.bias-bull{background:#0d2e1a;color:#2aff7a;border:1px solid rgba(42,255,122,.3)}
.bias-bear{background:#2e0d0d;color:#ff4a4a;border:1px solid rgba(255,74,74,.3)}
.bias-neut{background:#1a1a0d;color:#ffaa00;border:1px solid rgba(255,170,0,.3)}

/* SMC DETAILS */
.smc-section{padding:12px}
.smc-title{font-size:8px;color:#3a6a4a;letter-spacing:2px;margin-bottom:6px}
.smc-item{display:flex;gap:8px;margin-bottom:6px;font-size:9px;line-height:1.5}
.smc-key{color:#3a8a6a;min-width:70px;flex-shrink:0}
.smc-val{color:#c8dcc8}

/* TRADE PLAN */
.plan-box{background:#0a1a12;border:1px solid #1a3a2a;border-radius:4px;padding:10px 12px;margin:0 12px 12px;font-size:9px;line-height:1.7;color:#8acc9a}

/* INVALIDATION */
.inv-box{margin:0 12px 12px;font-size:9px;color:#ff6a6a;padding:7px 10px;background:#1a0a0a;border-radius:3px;border:1px solid #3a1010}

/* NEW ANALYSIS BTN */
.new-btn{width:calc(100% - 24px);margin:0 12px 12px;padding:10px;background:transparent;border:1px solid #2aff7a;color:#2aff7a;font-family:'IBM Plex Mono';font-size:10px;border-radius:4px;cursor:pointer;letter-spacing:1px}

/* LOADING ANIMATION */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes slideup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.ap{animation:pulse 1.5s infinite}
.as{animation:slideup .4s ease}

.analyzing-wrap{text-align:center;padding:30px 20px}
.analyzing-icon{font-size:32px;margin-bottom:12px}
.analyzing-steps{display:flex;flex-direction:column;gap:6px;text-align:left;max-width:260px;margin:0 auto}
.astep{font-size:9px;color:#3a6a4a;padding:4px 8px;border-radius:3px;background:#0a1a12;border:1px solid #1a3020}
.astep.active{color:#2aff7a;border-color:rgba(42,255,122,.4)}

/* TF chips on uploaded images */
.slot-label-row{display:flex;align-items:center;justify-content:space-between;width:100%;margin-bottom:4px}
</style>
</head>
<body>

<div id="header">
  <div>
    <div class="logo"><span>SMC</span> ANALYZER</div>
    <div class="sub">SMART MONEY CONCEPTS • AI POWERED</div>
  </div>
  <div style="font-size:9px;color:#3a5a4a;text-align:right">Multi-TF<br>Analysis</div>
</div>

<div id="app">

  <!-- PAIR INPUT -->
  <div class="selector-row">
    <div class="sel-group">
      <div class="sel-label">INSTRUMENT</div>
      <input class="sel-input" id="pair-input" placeholder="XAUUSD, EURUSD, BTCUSD..." value="XAUUSD"/>
    </div>
  </div>

  <!-- QUICK PAIR BUTTONS -->
  <div class="sel-wrap" style="margin-bottom:12px;gap:5px">
    <button class="sel-btn active" onclick="setPair(this,'XAUUSD')">XAU/USD</button>
    <button class="sel-btn" onclick="setPair(this,'EURUSD')">EUR/USD</button>
    <button class="sel-btn" onclick="setPair(this,'GBPUSD')">GBP/USD</button>
    <button class="sel-btn" onclick="setPair(this,'BTCUSD')">BTC/USD</button>
    <button class="sel-btn" onclick="setPair(this,'USDJPY')">USD/JPY</button>
  </div>

  <!-- UPLOAD SECTION -->
  <div id="upload-section">
    <div class="sel-label" style="margin-bottom:8px">CHART SCREENSHOTS UPLOAD KARO (jitne chahiye utne)</div>
    <div class="upload-grid" id="upload-grid"></div>
    <button class="add-tf-btn" onclick="addSlot()">+ AUR TIMEFRAME ADD KARO</button>
  </div>

  <!-- ANALYZE -->
  <button class="analyze-btn" id="analyze-btn" onclick="analyze()">◈ SMC ANALYSIS KARO</button>
  <div id="status"></div>

  <!-- RESULT -->
  <div id="result"></div>

</div>

<script>
const TF_OPTIONS = ["MN","W1","D1","H4","H1","M30","M15","M5","M1"];
let slots = [
  {id:"s0",tf:"H4",img:null,b64:null},
  {id:"s1",tf:"H1",img:null,b64:null},
  {id:"s2",tf:"M15",img:null,b64:null},
  {id:"s3",tf:"M5",img:null,b64:null},
];

function setPair(el,pair){
  document.querySelectorAll(".sel-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("pair-input").value=pair;
}

function addSlot(){
  const id="s"+Date.now();
  slots.push({id,tf:"M30",img:null,b64:null});
  renderGrid();
}

function removeSlot(id){
  slots=slots.filter(s=>s.id!==id);
  renderGrid();
}

function setTF(id,tf){
  const s=slots.find(x=>x.id===id);
  if(s)s.tf=tf;
  renderGrid();
}

function renderGrid(){
  const grid=document.getElementById("upload-grid");
  grid.innerHTML="";
  slots.forEach(slot=>{
    const div=document.createElement("div");
    div.className="upload-slot"+(slot.img?" has-img":"");
    div.id="slot-"+slot.id;

    // TF selector
    const tfSel=TF_OPTIONS.map(t=>`<option value="${t}" ${t===slot.tf?"selected":""}>${t}</option>`).join("");

    div.innerHTML=
      `<div class="slot-label-row">
        <select class="sel-input" style="width:auto;padding:2px 5px;font-size:9px;height:24px" onchange="setTF('${slot.id}',this.value)">${tfSel}</select>
        ${slots.length>1?`<button class="slot-remove" onclick="removeSlot('${slot.id}')">×</button>`:""}
      </div>`+
      (slot.img
        ? `<img class="slot-img" src="${slot.img}" alt="${slot.tf}"/><div style="font-size:7px;color:#2aff7a">✓ Uploaded</div>`
        : `<div class="slot-hint" style="margin-top:6px">📸 Tap to upload</div><div class="slot-hint" style="font-size:7px;margin-top:2px">${slot.tf} chart</div>`
      );

    div.onclick=(e)=>{
      if(e.target.tagName==="SELECT"||e.target.tagName==="OPTION"||e.target.tagName==="BUTTON")return;
      document.getElementById("file-"+slot.id)?.click()||triggerUpload(slot.id);
    };

    // Hidden file input
    const inp=document.createElement("input");
    inp.type="file";inp.accept="image/*";inp.id="file-"+slot.id;
    inp.className="upload-input";
    inp.onchange=(e)=>handleFile(slot.id,e.target.files[0]);
    div.appendChild(inp);

    grid.appendChild(div);
  });
}

function triggerUpload(id){
  const inp=document.createElement("input");
  inp.type="file";inp.accept="image/*";
  inp.onchange=(e)=>handleFile(id,e.target.files[0]);
  inp.click();
}

function handleFile(id,file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    const s=slots.find(x=>x.id===id);
    if(s){
      s.img=e.target.result;
      s.b64=e.target.result.split(",")[1];
      renderGrid();
    }
  };
  reader.readAsDataURL(file);
}

// Init
renderGrid();

// ── ANALYZE ──────────────────────────────────────────────
async function analyze(){
  const loaded=slots.filter(s=>s.b64);
  if(loaded.length===0){
    document.getElementById("status").textContent="⚠ Kam se kam ek screenshot upload karo!";
    return;
  }

  const pair=document.getElementById("pair-input").value.trim().toUpperCase()||"XAUUSD";
  const btn=document.getElementById("analyze-btn");
  btn.disabled=true;
  document.getElementById("result").style.display="none";

  // Show analyzing UI
  const tfNames=loaded.map(s=>s.tf).join(", ");
  document.getElementById("result").style.display="block";
  document.getElementById("result").innerHTML=`
    <div class="analyzing-wrap">
      <div class="analyzing-icon ap">🔍</div>
      <div style="font-size:11px;color:#2aff7a;margin-bottom:16px;letter-spacing:1px">SMC TOP-DOWN ANALYSIS HO RAHI HAI...</div>
      <div class="analyzing-steps">
        <div class="astep active">📊 Charts load ho rahe hain (${loaded.length} TFs)</div>
        <div class="astep active">🏛️ Higher TF structure analyze ho rahi hai</div>
        <div class="astep active">💧 Liquidity zones identify ho rahe hain</div>
        <div class="astep active">📦 Order Blocks & FVGs dhundh rahe hain</div>
        <div class="astep active">🎯 Entry, SL, TP calculate ho rahe hain</div>
      </div>
    </div>`;
  document.getElementById("status").textContent="";

  // Build messages with all images
  const contentParts=[];

  // Add all chart images
  loaded.forEach(s=>{
    contentParts.push({
      type:"image",
      source:{type:"base64",media_type:"image/jpeg",data:s.b64}
    });
    contentParts.push({
      type:"text",
      text:`Above image is the ${s.tf} timeframe chart of ${pair}.`
    });
  });

  // Get session
  const hour=new Date().getUTCHours();
  const session=hour>=22||hour<7?"ASIA (Tokyo)":hour>=7&&hour<12?"LONDON":hour>=12&&hour<17?"NEW_YORK":"OVERLAP";
  const tfList=loaded.map(s=>s.tf).sort((a,b)=>{
    const order=["MN","W1","D1","H4","H1","M30","M15","M5","M1"];
    return order.indexOf(a)-order.indexOf(b);
  });

  // Main prompt
  contentParts.push({
    type:"text",
    text:`You are an elite SMC (Smart Money Concepts) institutional trader with 20 years experience.

INSTRUMENT: ${pair}
TIMEFRAMES PROVIDED: ${tfList.join(" → ")} (highest to lowest)
CURRENT SESSION: ${session}

Analyze ALL the provided charts using complete top-down SMC methodology:

1. MARKET STRUCTURE (each TF):
   - Identify HH/HL (bullish) or LH/LL (bearish) on each TF
   - Recent BOS (Break of Structure) or CHoCH (Change of Character)
   - Overall bias from HTF to LTF

2. LIQUIDITY ANALYSIS:
   - BSL (Buy-side liquidity) levels above - equal highs, swing highs
   - SSL (Sell-side liquidity) below - equal lows, swing lows  
   - Has liquidity been swept recently? Which direction next?
   - Draw on liquidity (DOL) - where is price likely headed?

3. ORDER BLOCKS & FVGs:
   - Key OBs on each timeframe (bullish/bearish)
   - Fair Value Gaps present
   - Which OB/FVG is price currently at or approaching?
   - Mitigation status of key OBs

4. SESSION ANALYSIS:
   - Current session: ${session}
   - Session highs/lows from previous session
   - Expected session behavior

5. TRADE PLAN:
   - Direction: BUY or SELL (based on confluences)
   - Entry: Exact price level with reason
   - Stop Loss: Below/above invalidation point
   - TP1: Nearest liquidity target
   - TP2: Intermediate target  
   - TP3: Major liquidity/HTF target
   - Risk:Reward ratio

6. CONFLUENCE SCORE (1-100):
   - How many confluences align?
   - HTF bias alignment, OB/FVG, liquidity, session

Return ONLY this exact JSON (no markdown):
{
  "pair": "${pair}",
  "direction": "BUY or SELL or WAIT",
  "confidence": 85,
  "entry": 0,
  "sl": 0,
  "tp1": 0,
  "tp2": 0,
  "tp3": 0,
  "rr": "1:3",
  "bias": {
    "htf": "BULLISH/BEARISH",
    "itf": "BULLISH/BEARISH", 
    "ltf": "BULLISH/BEARISH"
  },
  "structure": "description of current structure",
  "bos_choch": "recent BOS or CHoCH details",
  "liquidity": {
    "bsl": "BSL level and description",
    "ssl": "SSL level and description",
    "swept": "what was swept recently",
    "dol": "draw on liquidity target"
  },
  "order_block": {
    "level": "OB price range",
    "tf": "timeframe",
    "type": "bullish/bearish",
    "status": "fresh/mitigated"
  },
  "fvg": "FVG details if present",
  "session": "${session}",
  "session_analysis": "session specific analysis",
  "entry_reason": "detailed entry reason in Hinglish",
  "trade_plan": "full trade management plan in Hinglish - when to move SL to BE, partial TP etc",
  "invalidation": "exact invalidation condition",
  "confluences": ["confluence 1", "confluence 2", "confluence 3", "confluence 4"]
}`
  });

  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:2000,
        messages:[{role:"user",content:contentParts}]
      })
    });
    const data=await res.json();
    const txt=(data.content||[]).map(c=>c.text||"").join("").replace(/```json/g,"").replace(/```/g,"").trim();
    const result=JSON.parse(txt);
    showResult(result,pair);
  }catch(e){
    document.getElementById("result").innerHTML=`<div style="padding:20px;text-align:center;color:#ff4a4a;font-size:10px">Error: Analysis fail hua. Dobara try karo.<br><br>${e.message||""}</div>`;
  }

  btn.disabled=false;
}

function showResult(r,pair){
  const col=r.direction==="BUY"?"#2aff7a":r.direction==="SELL"?"#ff4a4a":"#ffaa00";
  const bg=r.direction==="BUY"?"#0d2e1a":r.direction==="SELL"?"#2e0d0d":"#1a1a0d";
  const dt=r.direction==="BUY"?"▲ BUY":r.direction==="SELL"?"▼ SELL":"◈ WAIT";

  // Bias pills
  const biasHTML=Object.entries(r.bias||{}).map(([k,v])=>{
    const cls=v==="BULLISH"?"bias-bull":v==="BEARISH"?"bias-bear":"bias-neut";
    return `<span class="bias-pill ${cls}">${k.toUpperCase()}: ${v}</span>`;
  }).join("");

  // Confluences
  const confHTML=(r.confluences||[]).map(c=>`<div class="astep active" style="margin-bottom:4px">✓ ${c}</div>`).join("");

  const dp=pair==="XAUUSD"||pair==="BTCUSD"?2:pair==="USDJPY"?3:5;
  function fmtP(v){return v&&v>0?parseFloat(v).toFixed(dp):"--";}

  document.getElementById("result").className="as";
  document.getElementById("result").innerHTML=`
    <div class="result-card">
      <div class="result-header">
        <span class="result-title">SMC ANALYSIS — ${pair}</span>
        <span style="font-size:8px;color:#3a5a4a">${r.session||""}</span>
      </div>

      <!-- DIRECTION -->
      <div class="direction-box" style="background:${bg}">
        <div>
          <div class="dir-text" style="color:${col}">${dt}</div>
          <div style="font-size:8px;color:${col};margin-top:2px">${r.structure||""}</div>
        </div>
        <div class="conf-box">
          <div class="conf-num">${r.confidence||"--"}%</div>
          <div class="conf-lbl">CONFIDENCE</div>
        </div>
      </div>

      <!-- LEVELS -->
      <div class="levels-grid">
        <div class="level-cell"><div class="level-lbl">ENTRY</div><div class="level-val" style="color:#e2f4ea">${fmtP(r.entry)}</div></div>
        <div class="level-cell"><div class="level-lbl">STOP LOSS</div><div class="level-val" style="color:#ff4a4a">${fmtP(r.sl)}</div></div>
        <div class="level-cell"><div class="level-lbl">TP 1</div><div class="level-val" style="color:#2aff7a">${fmtP(r.tp1)}</div></div>
        <div class="level-cell"><div class="level-lbl">TP 2</div><div class="level-val" style="color:#2aff7a">${fmtP(r.tp2)}</div></div>
        <div class="level-cell"><div class="level-lbl">TP 3</div><div class="level-val" style="color:#1aff5a">${fmtP(r.tp3)}</div></div>
        <div class="level-cell"><div class="level-lbl">RISK:REWARD</div><div class="level-val" style="color:#2aff7a">${r.rr||"--"}</div></div>
      </div>

      <!-- BIAS -->
      <div class="bias-row">${biasHTML}</div>

      <!-- SMC DETAILS -->
      <div class="smc-section">
        <div class="smc-title">SMC DETAILS</div>
        <div class="smc-item"><span class="smc-key">BOS/CHoCH:</span><span class="smc-val">${r.bos_choch||"--"}</span></div>
        <div class="smc-item"><span class="smc-key">Order Block:</span><span class="smc-val">${r.order_block?.level||"--"} (${r.order_block?.tf||""} ${r.order_block?.type||""})</span></div>
        <div class="smc-item"><span class="smc-key">FVG:</span><span class="smc-val">${r.fvg||"--"}</span></div>
        <div class="smc-item"><span class="smc-key">BSL:</span><span class="smc-val">${r.liquidity?.bsl||"--"}</span></div>
        <div class="smc-item"><span class="smc-key">SSL:</span><span class="smc-val">${r.liquidity?.ssl||"--"}</span></div>
        <div class="smc-item"><span class="smc-key">Swept:</span><span class="smc-val">${r.liquidity?.swept||"--"}</span></div>
        <div class="smc-item"><span class="smc-key">DOL Target:</span><span class="smc-val" style="color:#2aff7a;font-weight:600">${r.liquidity?.dol||"--"}</span></div>
        <div class="smc-item"><span class="smc-key">Session:</span><span class="smc-val">${r.session_analysis||"--"}</span></div>
      </div>

      <!-- REASON -->
      <div style="padding:0 12px 8px">
        <div class="smc-title" style="margin-bottom:5px">ENTRY REASON</div>
        <div style="font-size:9px;color:#8acc9a;line-height:1.6;background:#0a0f18;border:1px solid #1a2820;border-radius:3px;padding:8px 10px">${r.entry_reason||"--"}</div>
      </div>

      <!-- TRADE PLAN -->
      <div style="padding:0 12px 8px">
        <div class="smc-title" style="margin-bottom:5px">TRADE MANAGEMENT PLAN</div>
        <div class="plan-box" style="margin:0">${r.trade_plan||"--"}</div>
      </div>

      <!-- CONFLUENCES -->
      ${confHTML?`<div style="padding:0 12px 8px"><div class="smc-title" style="margin-bottom:5px">CONFLUENCES</div>${confHTML}</div>`:""}

      <!-- INVALIDATION -->
      <div class="inv-box">⚠ INVALIDATION: ${r.invalidation||"--"}</div>

      <!-- NEW ANALYSIS -->
      <button class="new-btn" onclick="newAnalysis()">↺ NAYA ANALYSIS KARO</button>
    </div>`;
}

function newAnalysis(){
  document.getElementById("result").style.display="none";
  slots.forEach(s=>{s.img=null;s.b64=null;});
  renderGrid();
  window.scrollTo(0,0);
}
</script>
</body>
</html>
